apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: student-feedback-ingress
  namespace: student-feedback
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kcmkcmkcmkcmkcmkcmkcm.dpdns.org
      secretName: student-feedback-tls
  rules:
    - host: kcmkcmkcmkcmkcmkcmkcm.dpdns.org
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
