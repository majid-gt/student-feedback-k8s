apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: student-feedback
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dockermajid/student-feedback-frontend:2d63a2b243daeb118730882191cffb2da6c165f9
          imagePullPolicy: Always
          ports:
            - containerPort: 80
