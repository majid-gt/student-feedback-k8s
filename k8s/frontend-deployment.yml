apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: student-feedback
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dockermajid/student-feedback-frontend:b035b8082beb4ce6b220567a0c64ce91e5579351
          imagePullPolicy: Always
          ports:
            - containerPort: 80
